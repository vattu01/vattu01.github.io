<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poshalko Site</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1b1b1b;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:200px;
height:100%;
background:#111;
padding-top:20px;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#333;
}

.footer{
position:absolute;
bottom:10px;
left:15px;
font-size:12px;
color:#777;
}

.content{
margin-left:220px;
padding:40px;
}

.section{
margin-top:200px;
}

.character{
display:flex;
background:#2a2a2a;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.character img{
width:80px;
height:80px;
object-fit:cover;
border-radius:10px;
margin-right:15px;
}

.charText h2{
margin:0;
}

.moreText{
display:none;
margin-top:5px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
border-radius:6px;
background:#00c8a8;
cursor:pointer;
}

</style>

<script>

function showMore(id){
let t=document.getElementById(id);
if(t.style.display=="none"){
t.style.display="block";
}else{
t.style.display="none";
}
}

</script>

</head>

<body>

<div class="sidebar">
<a href="#characters">Персонажі</a>

<div class="footer">
by Poshalko Studio
</div>
</div>

<div class="content">

<h1>Мій сайт</h1>
<p>Ласкаво просимо.</p>

<div id="characters" class="section">
<h1>Персонажі</h1>


<div class="character">

<img src="images/character1.png">

<div class="charText">

<h2>Ім'я персонажа</h2>

<p>
Короткий опис персонажа.
</p>

<p id="more1" class="moreText">
Тут буде додатковий текст статті про персонажа.
</p>

<button onclick="showMore('more1')">Більше</button>

</div>
</div>



<div class="character">

<img src="images/character2.png">

<div class="charText">

<h2>Ім'я персонажа</h2>

<p>
Короткий опис персонажа.
</p>

<p id="more2" class="moreText">
Додатковий текст статті.
</p>

<button onclick="showMore('more2')">Більше</button>

</div>
</div>



</div>
</div>

</body>
</html>
